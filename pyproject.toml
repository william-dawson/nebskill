[project]
name = "nebskill"
version = "0.15.1"
description = "Nudged Elastic Band calculations for reaction barriers using MACE-OFF and Transition1x"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ase>=3.23",
    "mace-torch>=0.3",
    "h5py>=3.10",
    "requests>=2.31",
    "tqdm>=4.66",
    "pyyaml>=6.0",
    "matplotlib>=3.8",
    "numpy>=1.26",
    "remotemanager>=0.9",
    "pyscf>=2.5",
]

[project.scripts]
nebskill-download = "nebskill.download:main"
nebskill-load     = "nebskill.load:main"
nebskill-relax    = "nebskill.relax:main"
nebskill-neb      = "nebskill.neb:main"
nebskill-diagnose = "nebskill.diagnostics:main"
nebskill-analyze  = "nebskill.analyze:main"
nebskill-plot     = "nebskill.plot:main"
nebskill-writer   = "nebskill.writer:main"
nebskill-frequencies = "nebskill.frequencies:main"
nebskill-monitor  = "nebskill.monitor:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nebskill"]
