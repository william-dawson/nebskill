# Default parameters for NEB calculations.

dataset:
  path: data/Transition1x.h5
  download_url: https://ndownloader.figshare.com/files/36035789

calculator:
  backend: orca               # orca (the only backend)
  # --- level of theory (reproduce Transition1x) ---
  xc: wb97x                   # ωB97X, as in the dataset paper
  basis: 6-31g(d)             # 6-31G(d), as in the dataset paper
  # --- native ORCA jobs: Opt / NEB-CI / Freq ---
  # ORCA is an external binary, not a Python lib: it is invoked per job, has its
  # own NEB/optimizer/frequencies, and needs the cluster's modules loaded first.
  # The machine-specific recipe (binary path, modules, procs) is filled in at
  # setup by /nebskill:configuring-machine and written into neb_local.yaml.
  orca:
    command: orca             # full path to the orca binary on the cluster
    nprocs: 1                 # MPI ranks; drives both %pal nprocs AND the job's
                              # --ntasks-per-node so the two never disagree
    mem_per_proc_mb: 2000     # per-rank memory -> %maxcore; total -> job --mem
    simple_input: null        # extra ! keywords (e.g. "TightSCF Grid4"); null = none
    pre_launch: ""            # shell lines run before orca (module load / export),
                              # emitted into the job as JobSpec.pre_launch

# Endpoint relaxation and the NEB run are native ORCA jobs (! Opt, ! NEB-CI) — see
# the calculator.orca recipe above for level of theory and resources.
#
# Defaults track the Transition1x recipe (wB97X/6-31G(d), CI-NEB) but are not a
# strict clone. The goal is to reproduce most reactions and then surface
# deviations — especially a LOWER barrier (a better saddle/path) than the dataset.
neb:
  n_images: auto              # auto = max(n_images_min, round(path_length_Å / images_per_angstrom))
  images_per_angstrom: 1.0
  n_images_min: 15            # calibrated floor: the paper's 10 (and our early 9)
                              # under-resolve some ring rearrangements at our ORCA
                              # NEB-CI level — 15 recovered the dataset barrier
                              # exactly on every such case (r11/r13/r42/r47/r52/r59)
  # --- native ORCA NEB (its own keywords; see the ORCA manual) -> %neb block.
  # n_images above is reused; spring constant is ORCA's default unless
  # --spring-constant is given (ORCA's SpringConst is Eh/Bohr²). ---
  orca:
    neb_type: NEB-CI          # NEB-CI | NEB-TS | FAST-NEB-TS | LOOSE-NEB-TS |
                              # TIGHT-NEB-TS | ZOOM-NEB-CI (the ! simple-input variant)
    opt_method: LBFGS         # LBFGS | VPO | FIRE | BFGS  (Opt_Method)
    max_iter: 500             # MaxIter
    max_move: null            # Maxmove, Bohr/step; null = ORCA default (0.1)
    interpolation: IDPP       # IDPP | linear  (ORCA NEB Interpolation)
    sidpp: false              # Sequential IDPP for hard geometries (SIDPP)
    spring_constant2: null    # SpringConst2 (upper, energy-weighted); null = default
    energy_weighted: true     # Energy_Weighted (variable springs)
    free_end: false           # Free_End (let endpoints relax along the path)

filter:
  min_barrier_ev: 0.1         # skip reactions with barrier below this
