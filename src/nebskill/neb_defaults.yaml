# Default parameters for NEB calculations.

dataset:
  path: data/Transition1x.h5
  download_url: https://ndownloader.figshare.com/files/36035789

calculator:
  backend: mace               # mace | pyscf
  # --- mace backend ---
  model_size: medium          # small | medium | large
  device: auto                # auto | cpu | cuda
  dtype: float64
  # --- pyscf backend (reproduce Transition1x level of theory) ---
  xc: wb97x                   # ωB97X, as in the dataset paper
  basis: 6-31g(d)             # 6-31G(d), as in the dataset paper

relaxation:
  optimizer_1: FIRE
  optimizer_1_max_steps: 500
  optimizer_2: BFGS
  fmax: 0.01                  # eV/Å — endpoint relaxation (paper: 0.01)

# Defaults are close to the Transition1x recipe (10 images, k=0.1, CI-NEB to
# 0.05 eV/Å) but intentionally not a strict clone. The goal is to reproduce
# most reactions and then surface deviations — especially cases where our NEB
# finds a LOWER barrier (a better saddle / path) than the dataset reports.
neb:
  n_images: auto              # auto = max(n_images_min, round(path_length_Å / images_per_angstrom))
  images_per_angstrom: 1.0
  n_images_min: 10            # paper uses 10
  method: improvedtangent     # improvedtangent | string | spline | eb
  interpolation: idpp         # idpp | linear
  spring_constant: 0.1        # eV/Å — paper value
  remove_rotation_translation: true
  optimizer: FIRE             # FIRE | BFGS | ODE — band optimizer. ODE is ASE's
                              # NEB-specialized solver, best for tricky bands;
                              # paper used BFGS
  max_step: null              # Å per step; null = optimizer default. Lower
                              # (e.g. 0.05) stabilizes an oscillating band
  phase1_fmax: 0.5            # eV/Å — paper's plain-NEB target
  phase1_max_steps: 300
  phase2_fmax: 0.05           # eV/Å — paper's CI-NEB target
  phase2_max_steps: 500

retry:
  max_attempts: 3
  fallback_method: string

filter:
  min_barrier_ev: 0.1         # skip reactions with barrier below this
  min_segment_frames: 2       # min frames on each side of TS
